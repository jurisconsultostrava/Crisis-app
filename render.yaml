services:
  - type: web
    name: crisis-dashboard
    runtime: static
    buildCommand: npm install -g pnpm && pnpm install --ignore-scripts && pnpm --filter @workspace/crisis-dashboard build
    staticPublishPath: artifacts/crisis-dashboard/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: api-server
    runtime: node
    buildCommand: npm install -g pnpm && pnpm install --ignore-scripts && pnpm --filter @workspace/api-server build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false

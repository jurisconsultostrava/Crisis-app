services:
  - type: web
    name: crisis-dashboard
    runtime: node
    buildCommand: npm install -g pnpm && pnpm install --ignore-scripts && NODE_ENV=production pnpm --filter @workspace/crisis-dashboard build && pnpm --filter @workspace/api-server build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
